<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krynet Privacy Audit Test</title>
<style>
body { margin:0; font-family:system-ui,sans-serif; background:#121212; color:white; }
h1,p { text-align:center; margin-top:40px; }
#advisoryOverlay {
  position: fixed; bottom: 20px; right: 20px; width: 350px; max-height:90vh;
  background: rgba(10,10,10,0.95); color:white; z-index:999999; padding:20px;
  border-radius:12px; overflow:auto; box-shadow:0 0 20px rgba(0,0,0,0.7);
}
.info-bubble {
  position:absolute; bottom:70px; left:50%; transform:translateX(-50%);
  background:#333; color:white; padding:6px 10px; border-radius:6px;
  white-space:nowrap; opacity:0; transition:opacity 0.3s; pointer-events:none;
}
</style>
</head>
<body>
<h1>Krynet Privacy Audit Test Page</h1>
<p>The advisory overlay appears in the bottom-right corner.</p>

<script>
(async()=>{
  function getEnv() {
    const ua = navigator.userAgent;
    const platformStr = navigator.platform || '';
    let os='Unknown', browser='Unknown', engine='Unknown', device='Desktop';

    // DEVICE TYPE
    if(/mobile|android|iphone|ipad|tablet/i.test(ua)) device='Mobile';

    // OS detection
    if(/windows/i.test(ua)){
      if(/windows nt 10/i.test(ua)) os="Windows 10/11";
      else if(/windows nt 6.3/i.test(ua)) os="Windows 8.1";
      else if(/windows nt 6.2/i.test(ua)) os="Windows 8";
      else if(/windows nt 6.1/i.test(ua)) os="Windows 7";
      else os="Windows";
    } else if(/android/i.test(ua)) os="Android";
    else if(/iphone|ipad|ipod/i.test(ua)) os="iOS";
    else if(/mac/i.test(platformStr)) os="macOS";
    else if(/linux/i.test(ua) || /linux/i.test(platformStr)) os="Linux";

    // Engine detection
    if(/gecko/i.test(ua) && !/like gecko/i.test(ua)) engine="Gecko";
    else if(/applewebkit/i.test(ua) && !/chrome|chromium|edg|opr|vivaldi|brave/i.test(ua)) engine="WebKit";
    else if(/chrome|chromium|crios|edg|opr|vivaldi|brave/i.test(ua)) engine="Blink";

    // Browser detection
    if(/librewolf/i.test(ua)) browser="LibreWolf";
    else if(/waterfox/i.test(ua)) browser="Waterfox";
    else if(/pale moon/i.test(ua)) browser="Pale Moon";
    else if(/basilisk/i.test(ua)) browser="Basilisk";
    else if(/torbrowser/i.test(ua)) browser="Tor Browser";
    else if(/firefox/i.test(ua)) browser="Firefox";
    else if(/vivaldi/i.test(ua)) browser="Vivaldi";
    else if(/edg/i.test(ua)) browser="Edge";
    else if(/opr|opera/i.test(ua)) browser="Opera";
    else if(/chrome/i.test(ua)) browser="Chrome";
    else if(/safari/i.test(ua) && !/chrome/i.test(ua)) browser="Safari";

    // Privacy signals
    const privacySignals = {
      doNotTrack: navigator.doNotTrack==="1",
      globalPrivacyControl: navigator.globalPrivacyControl===true,
      cookies: navigator.cookieEnabled
    };

    // Adblock detection (very simple)
    let adblock=false;
    try {
      const bait=document.createElement('div');
      bait.className='ads ad adsbox doubleclick ad-placement';
      bait.style.height='1px';
      document.body.appendChild(bait);
      adblock = bait.offsetHeight===0;
      bait.remove();
    } catch {}

    // WebRTC leak
    const webRTCLeak=!!(window.RTCPeerConnection||window.webkitRTCPeerConnection);
    const torLikely = screen.width===1000 && screen.height===1000 && navigator.hardwareConcurrency<=2;
    const proxyHint = navigator.connection?.rtt>400;

    // Scores
    let privacyScore=50, securityScore=50;
    if(/Linux/i.test(os)) {privacyScore+=35; securityScore+=30;}
    if(/macOS/i.test(os)) {privacyScore+=15; securityScore+=20;}
    if(/Windows/i.test(os)) {privacyScore-=10; securityScore+=10;}
    if(/Android|iOS/i.test(os)) {privacyScore+=10; securityScore+=15;}
    if(engine==='Gecko') {privacyScore+=30; securityScore+=20;}
    if(engine==='WebKit') {privacyScore+=20; securityScore+=20;}
    if(engine==='Blink') {privacyScore-=40; securityScore+=20;}
    switch(browser){
      case 'Tor Browser': privacyScore+=70; securityScore+=40; break;
      case 'LibreWolf': privacyScore+=55; securityScore+=30; break;
      case 'Firefox': privacyScore+=35; securityScore+=25; break;
      default: privacyScore-=50; securityScore+=10; break;
    }
    if(privacySignals.doNotTrack) privacyScore+=5;
    if(privacySignals.globalPrivacyControl) privacyScore+=5;
    if(adblock) privacyScore+=10;
    if(torLikely) privacyScore+=30;

    return {os,browser,engine,device,privacySignals,adblock,webRTCLeak,proxyHint,torLikely,privacyScore,securityScore};
  }

  function showOverlay(env){
    let overlay=document.getElementById('advisoryOverlay');
    if(!overlay){
      overlay=document.createElement('div'); overlay.id='advisoryOverlay';
      document.body.appendChild(overlay);
    }
    const maxScore=100;
    const privacyPercent=Math.min(env.privacyScore,maxScore);
    const securityPercent=Math.min(env.securityScore,maxScore);

    const recommended=[
      {name:"Linux + Firefox", icon:"https://upload.wikimedia.org/wikipedia/commons/a/af/Tux.png", info:"Open-source OS + Gecko Firefox: strong privacy."},
      {name:"LibreWolf", icon:"https://upload.wikimedia.org/wikipedia/commons/0/08/Firefox_LibreWolf_Logo.svg", info:"Privacy-focused Firefox fork."},
      {name:"Tor Browser", icon:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Tor_Browser_Logo.svg", info:"Gecko + Tor network for max anonymity."}
    ];

    overlay.innerHTML=`
      <h2>Environment</h2>
      <ul>
        <li>OS: ${env.os}</li>
        <li>Browser: ${env.browser}</li>
        <li>Engine: ${env.engine}</li>
        <li>Device: ${env.device}</li>
        <li>Adblock: ${env.adblock}</li>
        <li>WebRTC Leak: ${env.webRTCLeak}</li>
        <li>Tor Likely: ${env.torLikely}</li>
      </ul>
      <h3>Scores</h3>
      <div style="display:flex;gap:5px;">
        <div style="flex:1;background:#333;height:10px;border-radius:5px;">
          <div style="width:${privacyPercent}%;height:10px;background:#4CAF50;border-radius:5px;"></div>
        </div>
        <div style="flex:1;background:#333;height:10px;border-radius:5px;">
          <div style="width:${securityPercent}%;height:10px;background:#2196F3;border-radius:5px;"></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;">
        ${recommended.map(r=>`
          <div style="text-align:center;position:relative;">
            <img src="${r.icon}" width="40" style="cursor:pointer;">
            <div class="info-bubble">${r.info}</div>
            <div style="font-size:12px">${r.name}</div>
          </div>`).join('')}
      </div>
    `;
    const bubbles=overlay.querySelectorAll('.info-bubble');
    overlay.querySelectorAll('img').forEach((img,i)=>{
      img.addEventListener('mouseenter',()=>bubbles[i].style.opacity='1');
      img.addEventListener('mouseleave',()=>bubbles[i].style.opacity='0');
    });
  }

  const env=getEnv();
  showOverlay(env);
})();
</script>
</body>
</html>
